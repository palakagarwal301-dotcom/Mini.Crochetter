<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Crochetter</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #333;
    }

    /* Hero Section - simple layout */
    .hero {
      width: 100%;
      text-align: center;
      padding: 40px 20px;
      background: #f9f9f9;
    }

    .hero img {
      max-width: 300px;
      margin: 10px;
      vertical-align: middle;
    }

    .hero h1 {
      margin-top: 20px;
      font-size: 2.5rem;
      color: #333;
    }

    .hero p {
      font-size: 1.2rem;
      color: #666;
    }

    /* Product Grid */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .product-card {
      text-align: center;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      background: #fafafa;
    }

    .product-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 6px;
    }

    .product-card h3 {
      margin-top: 10px;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

  <!-- Hero Section -->
  <section class="hero">
    <img src="hero_left.png" alt="Crochet hero left">
    <img src="hero_right.png" alt="Crochet hero right">
    <h1>Mini Crochetter</h1>
    <p>Handmade crochet with love</p>
  </section>

  <!-- Product Grid -->
  <section class="products">
    <div class="product-card">
      <img src="ref_baby_booties.jpg" alt="Crochet baby booties">
      <h3>Baby Booties</h3>
    </div>
    <div class="product-card">
      <img src="ref_adorable_plushies.jpg" alt="Crochet plushies">
      <h3>Adorable Plushies</h3>
    </div>
    <div class="product-card">
      <img src="ref_bags_pouches.jpg" alt="Crochet bags and pouches">
      <h3>Bags & Pouches</h3>
    </div>
    <div class="product-card">
      <img src="ref_floral_bouquets.jpg" alt="Crochet floral bouquets">
      <h3>Floral Bouquets</h3>
    </div>
    <div class="product-card">
      <img src="ref_hair_accessories.jpg" alt="Crochet hair accessories">
      <h3>Hair Accessories</h3>
    </div>
    <div class="product-card">
      <img src="ref_rakhi_minis.jpg" alt="Crochet rakhi and minis">
      <h3>Rakhi & Minis</h3>
    </div>
  </section>

</body>
</html>
